name: Release Obsidian theme

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (semver, e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.version) || github.ref }}

      - name: Extract release notes from CHANGELOG
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          awk -v version="$TAG" '
            /^## / {
              if (found) exit
              if ($2 == version) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No changelog section found for version $TAG (expected ## $TAG in CHANGELOG.md)"
            exit 1
          fi

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating assets (recovery mode)"
            gh release upload "$TAG" manifest.json theme.css --clobber
            gh release edit "$TAG" --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --title="$TAG" \
              --notes-file release-notes.md \
              manifest.json theme.css
          fi
